name: Android CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'ci/**' 
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
          gradle-version: 8.7

      - name: Build Debug APK
        run: |
          set +e
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build_output.txt
          EXIT=${PIPESTATUS[0]}
          exit $EXIT

      - name: Publish error (on failure)
        if: failure()
        run: |
          echo "## Build Failure Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -120 /tmp/build_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Also emit each error line as a workflow annotation. Annotations come
          # back through the REST API even when log blobs do not, which is the
          # only channel that actually reaches us.
          grep -iE "^e: |error:|FAILURE:|Caused by|Unresolved reference|not found" /tmp/build_output.txt \
            | head -25 \
            | while IFS= read -r line; do
                clean=$(echo "$line" | tr -d '\r' | sed 's/%/%%/g')
                echo "::error::$clean"
              done

      - name: Rename APK
        if: success()
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/*.apk out/RoshanKhata-latest.apk
          ls -lh out/

      # A rolling "latest" release: one clean, permanent download link that
      # always points at the newest build. No zip, no login, no digging
      # through Actions artifacts — just tap and install on the phone.
      - name: Publish to Releases
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Roshan Khata — Latest Build"
          body: |
            Latest development build of Roshan Khata.

            **Commit:** ${{ github.sha }}
            **Built:** ${{ github.event.head_commit.timestamp }}

            Tap `RoshanKhata-latest.apk` below to download and install.
            You may need to allow installs from unknown sources.
          files: out/RoshanKhata-latest.apk
          make_latest: true

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RoshanKhata-debug-apk
          path: app/build/outputs/apk/debug/*.apk
